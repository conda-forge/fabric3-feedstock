{% set name = "Fabric3" %}
{% set version = "1.14.post1" %}
{% set bundle = "tar.gz" %}
{% set hash_val = "647e485ec83f30b587862f92374d6affc217f3d79819d1d7f512e42e7ae51e81" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.{{ bundle }}
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ bundle }}
  sha256: {{ hash_val }}
build:
  noarch: python
  entry_points:
    - fab = fabric.main:main
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip

  run:
    - python >={{ python_min }}
    - paramiko >=2.0,<3.0
    - six >=1.10.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - fabric
    - fabric.contrib

  commands:
    - fab --help

about:
  home: https://github.com/mathiasertl/fabric/
  license: BSD 2-Clause
  license_file: LICENSE
  summary: 'Fabric is a simple, Pythonic tool for remote execution and deployment (py2.7/py3.4+ compatible fork).'
  license_family: BSD
  dev_url: https://github.com/mathiasertl/fabric/

extra:
  recipe-maintainers:
    - pmlandwehr
